# X-point API schema (xpoint-cli curated)
#
# This file is the authoritative schema for the operations that
# xpoint-cli supports. It describes actual request/response shapes
# (types reflect real API behavior, not the upstream OpenAPI spec,
# which has known bugs e.g. `form[].id` typed as string while the
# API actually returns integer).

operations:
  form.list:
    method: GET
    path: /api/v1/forms
    summary: 利用可能フォーム一覧取得
    description: |
      認証ユーザーが利用できるフォームのフォームID・名称を
      所属グループ (グループID・グループ名) とセットで返す。
    parameters: []
    response:
      type: object
      properties:
        form_group:
          type: array
          description: フォームグループ情報 (空配列になり得る)
          items:
            type: object
            properties:
              id:
                type: integer
                description: フォームグループID
              name:
                type: string
                description: フォームグループ名称
              form:
                type: array
                description: 所属フォーム情報
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: フォームID
                    code:
                      type: string
                      description: フォームコード
                    name:
                      type: string
                      description: フォーム名称
                    route:
                      type: array
                      description: 承認ルート情報
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: 承認ルートID
                          code:
                            type: string
                            description: 承認ルートコード (通常フォーム/自動選択ルートでは含まれない)
                          name:
                            type: string
                            description: 承認ルート名称

  approval.list:
    method: GET
    path: /api/v1/approvals
    summary: 承認待ち一覧取得
    description: 指定した承認状況タイプに該当する書類の一覧を返す。
    parameters:
      - name: stat
        in: query
        type: integer
        required: true
        description: |
          承認状況タイプ。
          10:承認待ち / 20:承認完了 / 30:申請中 / 40:差戻 / 50:取止 ほか
          詳細は X-point API ドキュメントを参照。
      - name: fgid
        in: query
        type: integer
        description: フォームグループID で絞り込み
      - name: fid
        in: query
        type: integer
        description: フォームID で絞り込み
      - name: step
        in: query
        type: integer
        description: ステップ番号で絞り込み
      - name: record_no
        in: query
        type: integer
        description: 取得開始レコード番号
      - name: get_line
        in: query
        type: integer
        description: 取得件数
      - name: proxy_user
        in: query
        type: string
        description: 代理ユーザーコード
      - name: filter
        in: query
        type: string
        description: 絞り込み条件式 (例 `cr_dt between "2023-01-01" and "2023-12-31"`)
      - name: show_hidden_doc
        in: query
        type: boolean
        description: 非表示書類も含めて取得するか
    response:
      type: object
      properties:
        total_count:
          type: integer
          description: 該当件数
        approval_list:
          type: array
          items:
            type: object
            properties:
              docid:
                type: integer
                description: 書類ID
              hidden:
                type: boolean
                description: 非表示書類フラグ (show_hidden_doc=true 指定時のみ含まれる)
              attachment:
                type: boolean
                description: 添付ファイルフラグ
              comment:
                type: boolean
                description: コメントフラグ
              title1:
                type: string
                description: 件名1
              title2:
                type: string
                description: 件名2
              form_name:
                type: string
                description: フォーム名称
              status:
                type: string
                description: ステータス名称
              display_status:
                type: string
                description: 画面表示ステータス名称
              apply_datetime:
                type: string
                description: 申請日時 (YYYY/MM/DD hh:mm:ss)
              apply_user:
                type: string
                description: 申請者氏名
              approval_user:
                type: array
                description: 現在ステップの承認者一覧
                items:
                  type: string
              lastaprv_datetime:
                type: string
                description: 最終更新日時 (YYYY/MM/DD hh:mm:ss)

  document.search:
    method: POST
    path: /api/v1/search/documents
    summary: 書類検索
    description: |
      検索条件を JSON ボディで指定して書類を検索する。
      ボディは省略可 (省略時は全書類が対象)。
    parameters:
      - name: size
        in: query
        type: integer
        description: 1ページあたりの取得件数
      - name: offset
        in: query
        type: integer
        description: 取得開始位置
      - name: page
        in: query
        type: integer
        description: ページ番号
    requestBody:
      contentType: application/json
      description: |
        任意の検索条件を JSON で指定する。代表的なキー:
          * title          件名1/件名2 (部分一致)
          * form_name      フォーム名称 (部分一致)
          * fgid / fid     フォームグループID / フォームID
          * comment_flg    コメントフラグ (0:条件なし 1:あり 2:なし)
          * order          並び替え条件 (例 `-title1`)
        その他の条件キーは X-point API ドキュメントを参照。
    response:
      type: object
      properties:
        total_count:
          type: integer
          description: 該当件数
        items:
          type: array
          items:
            type: object
            properties:
              docid:
                type: integer
                description: 書類ID
              has_attachments:
                type: boolean
                description: 添付ファイルの有無
              has_comments:
                type: boolean
                description: コメントの有無
              title1:
                type: string
                description: 件名1
              title2:
                type: string
                description: 件名2
              form:
                type: object
                description: フォーム情報
                properties:
                  id:
                    type: integer
                    description: フォームID
                  code:
                    type: string
                    description: フォームコード
                  name:
                    type: string
                    description: フォーム名称
              route:
                type: object
                description: 承認ルート情報
                properties:
                  code:
                    type: string
                    description: 承認ルートコード
                  name:
                    type: string
                    description: 承認ルート名称
              step:
                type: integer
                description: ステップ番号
              stat:
                type: integer
                description: 承認状況 (-1 は通常フォーム)
              write_datetime:
                type: string
                description: 申請日時 (YYYY/MM/DD hh:mm:ss)
              update_datetime:
                type: string
                description: 更新日時 (YYYY/MM/DD hh:mm:ss)
              writer:
                type: string
                description: 申請者
              current_approvers:
                type: array
                description: 現在ステップの承認者一覧
                items:
                  type: string
              url:
                type: string
                description: 書類URL
