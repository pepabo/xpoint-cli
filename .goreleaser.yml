version: 2

project_name: xpoint-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: xp
    binary: xp
    main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/pepabo/xpoint-cli/cmd.version={{.Version}}
      - -X github.com/pepabo/xpoint-cli/cmd.commit={{.Commit}}
      - -X github.com/pepabo/xpoint-cli/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
      - goos: darwin
        goarch: amd64
      - goos: windows
        goarch: arm64

archives:
  - formats: [binary]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
